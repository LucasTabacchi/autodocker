services:
  - type: web
    name: autodocker-web
    runtime: python
    plan: free
    region: virginia
    numInstances: 1
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: 'sh -lc "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers ${WEB_CONCURRENCY:-1} --timeout 120"'
    healthCheckPath: /health/
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: AUTODOCKER_TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DJANGO_DEBUG
        value: "false"
      - key: AUTODOCKER_DEPLOYMENT_ROLE
        value: "app"
      - key: DJANGO_USE_SQLITE
        value: "false"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "true"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "true"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "true"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "3600"
      - key: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "false"
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "false"
      - key: DJANGO_LOG_LEVEL
        value: "INFO"
      - key: AUTODOCKER_ASYNC_MODE
        value: "thread"
      - key: AUTODOCKER_ENABLE_RUNTIME_JOBS
        value: "false"
      - key: AUTODOCKER_VALIDATION_BACKEND
        value: "github_actions"
      - key: AUTODOCKER_VALIDATION_EXECUTOR_REPO
        sync: false
      - key: AUTODOCKER_VALIDATION_EXECUTOR_WORKFLOW
        value: "validate.yml"
      - key: AUTODOCKER_VALIDATION_EXECUTOR_TOKEN
        sync: false
      - key: DJANGO_DEFAULT_FROM_EMAIL
        value: "autodocker@render.local"
      - key: DJANGO_EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: SUPABASE_STORAGE_S3_ENDPOINT_URL
        sync: false
      - key: SUPABASE_STORAGE_S3_REGION
        sync: false
      - key: SUPABASE_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: SUPABASE_STORAGE_SECRET_ACCESS_KEY
        sync: false
